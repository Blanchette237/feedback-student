<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h4 class="card-title mb-4 text-center fw-bold">
            <i class="bi bi-person-plus me-2"></i>Create Account
          </h4>

          @if (errorMessage) {
            <div class="alert alert-danger py-2">{{ errorMessage }}</div>
          }

          <form (ngSubmit)="register()">
            <div class="mb-3">
              <label for="name" class="form-label">Full Name</label>
              <input
                type="text"
                class="form-control"
                id="name"
                name="name"
                [(ngModel)]="name"
                required
                placeholder="John Doe"
              />
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email address</label>
              <input
                type="email"
                class="form-control"
                id="email"
                name="email"
                [(ngModel)]="email"
                required
                placeholder="name@example.com"
              />
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input
                type="password"
                class="form-control"
                id="password"
                name="password"
                [(ngModel)]="password"
                required
                placeholder="••••••••"
              />
            </div>
            <div class="mb-3">
              <label for="confirmPassword" class="form-label">Confirm Password</label>
              <input
                type="password"
                class="form-control"
                id="confirmPassword"
                name="confirmPassword"
                [(ngModel)]="confirmPassword"
                required
                placeholder="••••••••"
              />
            </div>
            <div class="d-grid mt-4">
              <button
                type="submit"
                class="btn btn-primary"
                [disabled]="isSubmitting || !name || !email || !password || !confirmPassword"
              >
                @if (isSubmitting) {
                  <span class="spinner-border spinner-border-sm me-2"></span>Registering...
                } @else {
                  Register
                }
              </button>
            </div>
          </form>

          <hr class="my-3">
          <p class="text-center mb-0 text-muted">
            Already have an account? <a routerLink="/login">Sign in</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
